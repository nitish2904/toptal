# Application
spring.application.name=bookshop

# H2 Database (file-based for persistence across restarts)
spring.datasource.url=jdbc:h2:file:./data/bookshopdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (for development inspection)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwt.secret=ToptalBookshopSecretKeyForJWTTokenGenerationMustBeAtLeast256Bits!!
app.jwt.expiration-ms=86400000

# Cart expiry in minutes
app.cart.expiry-minutes=30

# Server
server.port=8080
